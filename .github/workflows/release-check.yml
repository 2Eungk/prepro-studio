name: Release Check

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: release-check-${{ github.event_name }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  release-check:
    name: Lint, Assets, Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run release checks
        run: npm run release:check
